<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZenCart Offline</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #0a0c10; color: #f8fafc; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at top, #1e3a8a, #0a0c10 55%); }
      .card { max-width: 480px; text-align: center; padding: 32px; border-radius: 20px; background: rgba(18,22,32,0.8); border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
      h1 { margin-bottom: 12px; font-size: 1.8rem; }
      p { color: #cbd5e1; line-height: 1.6; }
      a { color: #60a5fa; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>ZenCart is cached for a smoother experience, but some live content may be unavailable right now. Please reconnect to the internet to browse the latest inventory.</p>
      <p><a href="/">Try the home page again</a></p>
    </div>
  </body>
</html>
